name: Fresh Install Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  fresh-install:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup LaTeX on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/setup-local.sh scripts/compile-local.sh
          ./scripts/setup-local.sh

      - name: Setup LaTeX on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-ci-windows.ps1

      - name: Verify LaTeX commands on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            export PATH="/Library/TeX/texbin:$PATH"
          fi
          latexmk -version
          pdflatex --version
          bibtex --version
          test -f PDF/plantilla.pdf

      - name: Verify LaTeX commands on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          latexmk -version
          pdflatex --version
          bibtex --version
          perl --version
          if (-not (Test-Path "PDF\plantilla.pdf")) {
            throw "PDF\plantilla.pdf was not generated."
          }

      - name: Upload generated PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf-${{ matrix.os }}
          path: PDF/plantilla.pdf
